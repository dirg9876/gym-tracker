name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel any in-flight run for the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check:
    name: Typecheck + build (web + api)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # pnpm 9 matches the lockfile (lockfileVersion: 9.0). pnpm 10 reads it
      # backward-compatibly but we pin to 9 to avoid any drift.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Workspace-wide typecheck: shared libs (api-spec, api-zod,
      # api-client-react, db, …) followed by every artifact / scripts package
      # that defines a `typecheck` script (api-server, gym-tracker,
      # gym-tracker-mobile, mockup-sandbox, scripts).
      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      # vite.config.ts requires PORT and BASE_PATH at build time. Values are
      # arbitrary for CI — the build only embeds BASE_PATH (used as the
      # public base URL); PORT is only read by the dev server.
      - name: Build web app
        env:
          PORT: 8080
          BASE_PATH: /
        run: pnpm --filter @workspace/gym-tracker run build
