kind = "web"
previewPath = "/"
title = "Тренировки"
version = "1.0.0"
id = "artifacts/gym-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26029

[services.development]
run = "pnpm --filter @workspace/gym-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gym-tracker", "run", "build" ]
publicDir = "artifacts/gym-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26029"
BASE_PATH = "/"
