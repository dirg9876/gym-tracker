openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Gym workout tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: exercises
    description: Exercise catalog
  - name: workouts
    description: Workouts and sets
  - name: stats
    description: Stats, records, and progress
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /exercises:
    get:
      operationId: listExercises
      tags: [exercises]
      summary: List exercises in the catalog
      responses:
        "200":
          description: List of exercises
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Exercise"
    post:
      operationId: createExercise
      tags: [exercises]
      summary: Create a custom exercise
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExerciseInput"
      responses:
        "201":
          description: Created exercise
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exercise"

  /exercises/{exerciseId}:
    delete:
      operationId: deleteExercise
      tags: [exercises]
      summary: Delete a custom exercise
      parameters:
        - name: exerciseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /workouts:
    get:
      operationId: listWorkouts
      tags: [workouts]
      summary: List workouts (newest first)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Workouts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkoutSummary"
    post:
      operationId: createWorkout
      tags: [workouts]
      summary: Start a new workout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkoutInput"
      responses:
        "201":
          description: New workout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workout"

  /workouts/active:
    get:
      operationId: getActiveWorkout
      tags: [workouts]
      summary: Get the currently active (not finished) workout, if any
      responses:
        "200":
          description: Active workout or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveWorkoutResponse"

  /workouts/{workoutId}:
    get:
      operationId: getWorkout
      tags: [workouts]
      summary: Get a workout with its sets
      parameters:
        - name: workoutId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workout details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workout"
    delete:
      operationId: deleteWorkout
      tags: [workouts]
      summary: Delete a workout and all its sets
      parameters:
        - name: workoutId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /workouts/{workoutId}/comparison:
    get:
      operationId: getWorkoutComparison
      tags: [workouts]
      summary: Compare a finished workout against the previous similar workout
      parameters:
        - name: workoutId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comparison report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutComparison"

  /exercises/{exerciseId}/last-sets:
    get:
      operationId: getExerciseLastSets
      tags: [exercises]
      summary: Last finished workout's sets for this exercise
      parameters:
        - name: exerciseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Last sets snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExerciseLastSets"

  /stats/heatmap:
    get:
      operationId: getHeatmap
      tags: [stats]
      summary: Daily training intensity for the past N days
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
            default: 365
      responses:
        "200":
          description: Heatmap series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeatmapResponse"

  /stats/forecast:
    get:
      operationId: getLevelForecast
      tags: [stats]
      summary: Estimated days to reach next level based on recent trajectory
      responses:
        "200":
          description: Level forecast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LevelForecast"

  /workouts/{workoutId}/finish:
    post:
      operationId: finishWorkout
      tags: [workouts]
      summary: Finish a workout and get the report with new records
      parameters:
        - name: workoutId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workout report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutReport"

  /workouts/{workoutId}/sets:
    post:
      operationId: addSet
      tags: [workouts]
      summary: Add a set to a workout
      parameters:
        - name: workoutId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSetInput"
      responses:
        "201":
          description: Created set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutSet"

  /sets/{setId}:
    delete:
      operationId: deleteSet
      tags: [workouts]
      summary: Delete a set
      parameters:
        - name: setId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stats/overview:
    get:
      operationId: getStatsOverview
      tags: [stats]
      summary: Overall stats and personal records
      responses:
        "200":
          description: Overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsOverview"

  /stats/progress:
    get:
      operationId: getProgress
      tags: [stats]
      summary: Progress over time across all workouts
      responses:
        "200":
          description: Progress series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressSeries"

  /stats/exercises/{exerciseId}/progress:
    get:
      operationId: getExerciseProgress
      tags: [stats]
      summary: Progress over time for a single exercise
      parameters:
        - name: exerciseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Per-exercise progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExerciseProgress"

  /levels:
    get:
      operationId: getLevels
      tags: [stats]
      summary: Full levels ladder with current user level and progress
      responses:
        "200":
          description: Levels ladder + current progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LevelsResponse"

  /programs:
    get:
      operationId: listPrograms
      tags: [programs]
      summary: List of available training programs (chest day, leg day, etc.)
      responses:
        "200":
          description: List of programs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgramsListResponse"

  /programs/{programId}:
    get:
      operationId: getProgramPlan
      tags: [programs]
      summary: Build a workout plan for the given program based on the user's current level and PRs
      parameters:
        - name: programId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Computed program plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgramPlan"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Exercise:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        muscleGroup:
          type: string
        isCustom:
          type: boolean
        isMain:
          type: boolean
      required: [id, name, muscleGroup, isCustom, isMain]

    CreateExerciseInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        muscleGroup:
          type: string
          minLength: 1
          maxLength: 40
      required: [name, muscleGroup]

    CreateWorkoutInput:
      type: object
      properties:
        name:
          type: string
          maxLength: 80
      required: []

    AddSetInput:
      type: object
      properties:
        exerciseId:
          type: integer
        weightKg:
          type: number
          minimum: 0
        reps:
          type: integer
          minimum: 1
      required: [exerciseId, weightKg, reps]

    WorkoutSet:
      type: object
      properties:
        id:
          type: integer
        workoutId:
          type: integer
        exerciseId:
          type: integer
        exerciseName:
          type: string
        muscleGroup:
          type: string
        weightKg:
          type: number
        reps:
          type: integer
        volume:
          type: number
          description: weightKg * reps
        createdAt:
          type: string
          format: date-time
      required:
        [id, workoutId, exerciseId, exerciseName, muscleGroup, weightKg, reps, volume, createdAt]

    Workout:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true
        sets:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSet"
        totalVolume:
          type: number
        totalReps:
          type: integer
        totalSets:
          type: integer
      required: [id, startedAt, sets, totalVolume, totalReps, totalSets]

    WorkoutSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true
        totalVolume:
          type: number
        totalReps:
          type: integer
        totalSets:
          type: integer
        exerciseCount:
          type: integer
        topExercises:
          type: array
          items:
            type: string
      required:
        [id, startedAt, totalVolume, totalReps, totalSets, exerciseCount, topExercises]

    ActiveWorkoutResponse:
      type: object
      properties:
        workout:
          oneOf:
            - $ref: "#/components/schemas/Workout"
            - type: "null"
      required: [workout]

    PersonalRecord:
      type: object
      properties:
        kind:
          type: string
          enum: [tonnage, reps, max_weight]
        value:
          type: number
        previous:
          type: number
        delta:
          type: number
      required: [kind, value, previous, delta]

    ExerciseRecord:
      type: object
      properties:
        exerciseId:
          type: integer
        exerciseName:
          type: string
        muscleGroup:
          type: string
        kind:
          type: string
          enum: [max_weight, max_reps, max_volume_set]
        value:
          type: number
        previous:
          type: number
        reps:
          type: integer
          nullable: true
        weightKg:
          type: number
          nullable: true
      required: [exerciseId, exerciseName, muscleGroup, kind, value, previous]

    WorkoutReport:
      type: object
      properties:
        workout:
          $ref: "#/components/schemas/Workout"
        newPersonalRecords:
          type: array
          items:
            $ref: "#/components/schemas/PersonalRecord"
        newExerciseRecords:
          type: array
          items:
            $ref: "#/components/schemas/ExerciseRecord"
        durationMinutes:
          type: number
        exerciseBreakdown:
          type: array
          items:
            type: object
            properties:
              exerciseId:
                type: integer
              exerciseName:
                type: string
              muscleGroup:
                type: string
              sets:
                type: integer
              reps:
                type: integer
              volume:
                type: number
              topSetWeight:
                type: number
            required:
              [exerciseId, exerciseName, muscleGroup, sets, reps, volume, topSetWeight]
      required: [workout, newPersonalRecords, newExerciseRecords, durationMinutes, exerciseBreakdown]

    StatsOverview:
      type: object
      properties:
        totalWorkouts:
          type: integer
        totalVolume:
          type: number
        totalReps:
          type: integer
        totalSets:
          type: integer
        bestTonnage:
          type: number
        bestReps:
          type: integer
        bestMaxWeight:
          type: number
        currentStreakDays:
          type: integer
        weekWorkouts:
          type: integer
        topExercises:
          type: array
          items:
            type: object
            properties:
              exerciseId:
                type: integer
              name:
                type: string
              muscleGroup:
                type: string
              sets:
                type: integer
              volume:
                type: number
              maxWeightKg:
                type: number
            required: [exerciseId, name, muscleGroup, sets, volume, maxWeightKg]
        muscleGroupVolume:
          type: array
          items:
            type: object
            properties:
              muscleGroup:
                type: string
              volume:
                type: number
              sets:
                type: integer
            required: [muscleGroup, volume, sets]
      required:
        - totalWorkouts
        - totalVolume
        - totalReps
        - totalSets
        - bestTonnage
        - bestReps
        - bestMaxWeight
        - currentStreakDays
        - weekWorkouts
        - topExercises
        - muscleGroupVolume

    ProgressPoint:
      type: object
      properties:
        workoutId:
          type: integer
        date:
          type: string
          format: date-time
        volume:
          type: number
        reps:
          type: integer
        maxWeight:
          type: number
      required: [workoutId, date, volume, reps, maxWeight]

    ProgressSeries:
      type: object
      properties:
        points:
          type: array
          items:
            $ref: "#/components/schemas/ProgressPoint"
      required: [points]

    ExerciseProgressPoint:
      type: object
      properties:
        workoutId:
          type: integer
        date:
          type: string
          format: date-time
        volume:
          type: number
        reps:
          type: integer
        maxWeight:
          type: number
        topSet:
          type: object
          properties:
            weightKg:
              type: number
            reps:
              type: integer
          required: [weightKg, reps]
      required: [workoutId, date, volume, reps, maxWeight, topSet]

    ExerciseProgress:
      type: object
      properties:
        exercise:
          $ref: "#/components/schemas/Exercise"
        points:
          type: array
          items:
            $ref: "#/components/schemas/ExerciseProgressPoint"
      required: [exercise, points]

    Level:
      type: object
      properties:
        level:
          type: integer
        name:
          type: string
        description:
          type: string
        tier:
          type: integer
        benchmarkKg:
          type: number
        tonnage30dKgRequired:
          type: number
        mainExercisesRequired:
          type: integer
      required:
        - level
        - name
        - description
        - tier
        - benchmarkKg
        - tonnage30dKgRequired
        - mainExercisesRequired

    MainExerciseStat:
      type: object
      properties:
        exerciseId:
          type: integer
        name:
          type: string
        muscleGroup:
          type: string
        maxWeightKg:
          type: number
      required: [exerciseId, name, muscleGroup, maxWeightKg]

    LevelStats:
      type: object
      properties:
        currentTonnage30dKg:
          type: number
        maxTonnage30dKg:
          type: number
        oldestSetInWindowAt:
          type: string
          format: date-time
          nullable: true
        mainExercises:
          type: array
          items:
            $ref: "#/components/schemas/MainExerciseStat"
      required:
        - currentTonnage30dKg
        - maxTonnage30dKg
        - oldestSetInWindowAt
        - mainExercises

    LevelsResponse:
      type: object
      properties:
        levels:
          type: array
          items:
            $ref: "#/components/schemas/Level"
        currentLevel:
          type: integer
        bestLevelEver:
          type: integer
        nextLevel:
          type: integer
          nullable: true
        stats:
          $ref: "#/components/schemas/LevelStats"
      required:
        - levels
        - currentLevel
        - bestLevelEver
        - nextLevel
        - stats

    ProgramSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        emoji:
          type: string
        exerciseCount:
          type: integer
      required: [id, name, description, emoji, exerciseCount]

    ProgramsListResponse:
      type: object
      properties:
        programs:
          type: array
          items:
            $ref: "#/components/schemas/ProgramSummary"
      required: [programs]

    PlannedExercise:
      type: object
      properties:
        exerciseId:
          type: integer
        name:
          type: string
        muscleGroup:
          type: string
        sets:
          type: integer
        repsMin:
          type: integer
        repsMax:
          type: integer
        intent:
          type: string
          enum: [strength, hypertrophy, accessory]
        suggestedWeightKg:
          type: number
        isBodyweight:
          type: boolean
        basedOn:
          type: string
          enum: [personal-record, level-benchmark]
        note:
          type: string
          nullable: true
      required:
        - exerciseId
        - name
        - muscleGroup
        - sets
        - repsMin
        - repsMax
        - intent
        - suggestedWeightKg
        - isBodyweight
        - basedOn
        - note

    ProgramPlan:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        emoji:
          type: string
        basedOnLevel:
          type: integer
        basedOnLevelName:
          type: string
        benchmarkKg:
          type: number
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/PlannedExercise"
      required:
        - id
        - name
        - description
        - emoji
        - basedOnLevel
        - basedOnLevelName
        - benchmarkKg
        - exercises

    ExerciseLastSetEntry:
      type: object
      properties:
        weightKg:
          type: number
        reps:
          type: integer
      required: [weightKg, reps]

    ExerciseLastSets:
      type: object
      properties:
        exerciseId:
          type: integer
        workoutId:
          type: integer
          nullable: true
        workoutName:
          type: string
          nullable: true
        workoutDate:
          type: string
          format: date-time
          nullable: true
        sets:
          type: array
          items:
            $ref: "#/components/schemas/ExerciseLastSetEntry"
        bestEverWeightKg:
          type: number
          nullable: true
        bestEverReps:
          type: integer
          nullable: true
      required: [exerciseId, sets]

    WorkoutComparisonExercise:
      type: object
      properties:
        exerciseId:
          type: integer
        name:
          type: string
        currentVolume:
          type: number
        previousVolume:
          type: number
        deltaVolume:
          type: number
        currentMaxWeight:
          type: number
        previousMaxWeight:
          type: number
        deltaMaxWeight:
          type: number
        currentReps:
          type: integer
        previousReps:
          type: integer
        deltaReps:
          type: integer
      required:
        - exerciseId
        - name
        - currentVolume
        - previousVolume
        - deltaVolume
        - currentMaxWeight
        - previousMaxWeight
        - deltaMaxWeight
        - currentReps
        - previousReps
        - deltaReps

    WorkoutComparison:
      type: object
      properties:
        workoutId:
          type: integer
        previousWorkoutId:
          type: integer
          nullable: true
        previousWorkoutDate:
          type: string
          format: date-time
          nullable: true
        previousWorkoutName:
          type: string
          nullable: true
        deltaVolume:
          type: number
        deltaReps:
          type: integer
        deltaSets:
          type: integer
        durationDeltaMinutes:
          type: number
          nullable: true
        exercises:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutComparisonExercise"
      required:
        - workoutId
        - previousWorkoutId
        - deltaVolume
        - deltaReps
        - deltaSets
        - exercises

    HeatmapDay:
      type: object
      properties:
        date:
          type: string
          description: ISO date YYYY-MM-DD
        volume:
          type: number
        sets:
          type: integer
        intensity:
          type: integer
          description: 0..4 bucket
      required: [date, volume, sets, intensity]

    HeatmapResponse:
      type: object
      properties:
        days:
          type: array
          items:
            $ref: "#/components/schemas/HeatmapDay"
        maxVolume:
          type: number
        totalDays:
          type: integer
        activeDays:
          type: integer
      required: [days, maxVolume, totalDays, activeDays]

    LevelForecast:
      type: object
      properties:
        currentLevel:
          type: integer
        nextLevel:
          type: integer
          nullable: true
        nextLevelName:
          type: string
          nullable: true
        tonnageNeededKg:
          type: number
        tonnage7dKg:
          type: number
        tonnage30dKg:
          type: number
        avgDailyTonnageKg:
          type: number
        estimatedDays:
          type: integer
          nullable: true
        confidence:
          type: string
          enum: [low, medium, high, achieved]
      required:
        - currentLevel
        - nextLevel
        - tonnageNeededKg
        - tonnage7dKg
        - tonnage30dKg
        - avgDailyTonnageKg
        - confidence
