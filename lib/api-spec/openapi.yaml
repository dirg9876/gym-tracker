openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Gym workout tracker API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: exercises
    description: Exercise catalog
  - name: workouts
    description: Workouts and sets
  - name: stats
    description: Stats, records, and progress
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /exercises:
    get:
      operationId: listExercises
      tags: [exercises]
      summary: List exercises in the catalog
      responses:
        "200":
          description: List of exercises
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Exercise"
    post:
      operationId: createExercise
      tags: [exercises]
      summary: Create a custom exercise
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExerciseInput"
      responses:
        "201":
          description: Created exercise
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exercise"

  /exercises/{exerciseId}:
    patch:
      operationId: updateExercise
      tags: [exercises]
      summary: Update mutable flags on an exercise (e.g. isMain)
      parameters:
        - name: exerciseId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExerciseInput"
      responses:
        "200":
          description: Updated exercise
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Exercise"
        "404":
          description: Not found
    delete:
      operationId: deleteExercise
      tags: [exercises]
      summary: Delete a custom exercise
      parameters:
        - name: exerciseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /workouts:
    get:
      operationId: listWorkouts
      tags: [workouts]
      summary: List workouts (newest first)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Workouts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorkoutSummary"
    post:
      operationId: createWorkout
      tags: [workouts]
      summary: Start a new workout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkoutInput"
      responses:
        "200":
          description: Existing active workout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workout"
        "201":
          description: New workout
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workout"

  /workouts/active:
    get:
      operationId: getActiveWorkout
      tags: [workouts]
      summary: Get the currently active (not finished) workout, if any
      responses:
        "200":
          description: Active workout or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveWorkoutResponse"

  /workouts/{workoutId}:
    get:
      operationId: getWorkout
      tags: [workouts]
      summary: Get a workout with its sets
      parameters:
        - name: workoutId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workout details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workout"
    delete:
      operationId: deleteWorkout
      tags: [workouts]
      summary: Delete a workout and all its sets
      parameters:
        - name: workoutId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /workouts/{workoutId}/exercise-breakdown:
    get:
      operationId: getWorkoutExerciseBreakdown
      tags: [workouts]
      summary: Per-exercise breakdown with deltas vs the previous time this exercise was trained
      parameters:
        - name: workoutId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Per-exercise breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutExerciseBreakdownResponse"

  /workouts/{workoutId}/comparison:
    get:
      operationId: getWorkoutComparison
      tags: [workouts]
      summary: Compare a finished workout against the previous similar workout
      parameters:
        - name: workoutId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Comparison report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutComparison"

  /exercises/{exerciseId}/norms:
    get:
      operationId: getExerciseNorms
      tags: [exercises]
      summary: Sport rank ladder for a single exercise
      parameters:
        - name: exerciseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Exercise rank norms
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExerciseRankNorms"
        "404":
          description: Not found

  /exercises/{exerciseId}/last-sets:
    get:
      operationId: getExerciseLastSets
      tags: [exercises]
      summary: Last finished workout's sets for this exercise
      parameters:
        - name: exerciseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Last sets snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExerciseLastSets"

  /stats/heatmap:
    get:
      operationId: getHeatmap
      tags: [stats]
      summary: Daily training intensity for the past N days
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
            default: 365
      responses:
        "200":
          description: Heatmap series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeatmapResponse"

  /stats/forecast:
    get:
      operationId: getLevelForecast
      tags: [stats]
      summary: Estimated days to reach next level based on recent trajectory
      responses:
        "200":
          description: Level forecast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LevelForecast"

  /workouts/{workoutId}/finish:
    post:
      operationId: finishWorkout
      tags: [workouts]
      summary: Finish a workout and get the report with new records
      parameters:
        - name: workoutId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workout report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutReport"

  /workouts/{workoutId}/sets:
    post:
      operationId: addSet
      tags: [workouts]
      summary: Add a set to a workout
      parameters:
        - name: workoutId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSetInput"
      responses:
        "201":
          description: Created set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkoutSet"

  /sets/{setId}:
    delete:
      operationId: deleteSet
      tags: [workouts]
      summary: Delete a set
      parameters:
        - name: setId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /stats/overview:
    get:
      operationId: getStatsOverview
      tags: [stats]
      summary: Overall stats and personal records
      responses:
        "200":
          description: Overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsOverview"

  /stats/progress:
    get:
      operationId: getProgress
      tags: [stats]
      summary: Progress over time across all workouts
      responses:
        "200":
          description: Progress series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressSeries"

  /stats/exercises/{exerciseId}/progress:
    get:
      operationId: getExerciseProgress
      tags: [stats]
      summary: Progress over time for a single exercise
      parameters:
        - name: exerciseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Per-exercise progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExerciseProgress"

  /levels:
    get:
      operationId: getLevels
      tags: [stats]
      summary: Full levels ladder with current user level and progress
      responses:
        "200":
          description: Levels ladder + current progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LevelsResponse"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get the user's body profile (weight, height, BMI)
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
    put:
      operationId: updateProfile
      tags: [profile]
      summary: Update the user's body profile. Pass null to clear a field.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileInput"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "400":
          description: Validation error

  /programs:
    get:
      operationId: listPrograms
      tags: [programs]
      summary: List of available training programs (chest day, leg day, etc.)
      responses:
        "200":
          description: List of programs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgramsListResponse"

  /programs/{programId}:
    get:
      operationId: getProgramPlan
      tags: [programs]
      summary: Build a workout plan for the given program based on the user's current level and PRs
      parameters:
        - name: programId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Computed program plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgramPlan"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Equipment:
      type: string
      enum: [barbell, dumbbell, bodyweight, machine, other]
      description: >-
        Equipment kind for an exercise. Drives UI affordances (e.g. the
        "доп. вес" input for bodyweight), the auto-pass rule for barbell
        exercises whose required weight is below the empty-bar floor, and
        the equipment badge on the exercises page.

    Exercise:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        muscleGroup:
          type: string
        isCustom:
          type: boolean
        isMain:
          type: boolean
        equipment:
          $ref: "#/components/schemas/Equipment"
        mcKg:
          type: number
          nullable: true
          description: >
            МС-equivalent target weight (kg) for this exercise given the user's
            body weight and sex. Present only for main (isMain=true) weight-based
            exercises; null or absent otherwise.
        userMaxKg:
          type: number
          nullable: true
          description: >-
            User's all-time best recorded weight (kg) for this exercise across
            finished workouts. Null if no sets have been logged yet.
        userRank:
          oneOf:
            - $ref: "#/components/schemas/SportRank"
            - type: "null"
          description: >-
            Computed sport rank for this exercise based on userMaxKg vs mcKg.
            Null if userMaxKg is null or mcKg is null (e.g. time-based exercises).
      required: [id, name, muscleGroup, isCustom, isMain, equipment]

    CreateExerciseInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        muscleGroup:
          type: string
          minLength: 1
          maxLength: 40
        equipment:
          $ref: "#/components/schemas/Equipment"
      required: [name, muscleGroup]

    CreateWorkoutInput:
      type: object
      properties:
        name:
          type: string
          maxLength: 80
      required: []

    AddSetInput:
      type: object
      properties:
        exerciseId:
          type: integer
        weightKg:
          type: number
          minimum: 0
        reps:
          type: integer
          minimum: 1
      required: [exerciseId, weightKg, reps]

    WorkoutSet:
      type: object
      properties:
        id:
          type: integer
        workoutId:
          type: integer
        exerciseId:
          type: integer
        exerciseName:
          type: string
        muscleGroup:
          type: string
        weightKg:
          type: number
        reps:
          type: integer
        volume:
          type: number
          description: weightKg * reps
        createdAt:
          type: string
          format: date-time
      required:
        [id, workoutId, exerciseId, exerciseName, muscleGroup, weightKg, reps, volume, createdAt]

    Workout:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true
        sets:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutSet"
        totalVolume:
          type: number
        totalReps:
          type: integer
        totalSets:
          type: integer
      required: [id, startedAt, sets, totalVolume, totalReps, totalSets]

    WorkoutSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true
        totalVolume:
          type: number
        totalReps:
          type: integer
        totalSets:
          type: integer
        exerciseCount:
          type: integer
        topExercises:
          type: array
          items:
            type: string
      required:
        [id, startedAt, totalVolume, totalReps, totalSets, exerciseCount, topExercises]

    ActiveWorkoutResponse:
      type: object
      properties:
        workout:
          oneOf:
            - $ref: "#/components/schemas/Workout"
            - type: "null"
      required: [workout]

    PersonalRecord:
      type: object
      properties:
        kind:
          type: string
          enum: [tonnage, reps, max_weight]
        value:
          type: number
        previous:
          type: number
        delta:
          type: number
      required: [kind, value, previous, delta]

    ExerciseRecord:
      type: object
      properties:
        exerciseId:
          type: integer
        exerciseName:
          type: string
        muscleGroup:
          type: string
        kind:
          type: string
          enum: [max_weight, max_reps, max_volume_set]
        value:
          type: number
        previous:
          type: number
        reps:
          type: integer
          nullable: true
        weightKg:
          type: number
          nullable: true
      required: [exerciseId, exerciseName, muscleGroup, kind, value, previous]

    WorkoutReport:
      type: object
      properties:
        workout:
          $ref: "#/components/schemas/Workout"
        newPersonalRecords:
          type: array
          items:
            $ref: "#/components/schemas/PersonalRecord"
        newExerciseRecords:
          type: array
          items:
            $ref: "#/components/schemas/ExerciseRecord"
        durationMinutes:
          type: number
        exerciseBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutExerciseBreakdownItem"
      required: [workout, newPersonalRecords, newExerciseRecords, durationMinutes, exerciseBreakdown]

    UpdateExerciseInput:
      type: object
      properties:
        isMain:
          type: boolean
        equipment:
          $ref: "#/components/schemas/Equipment"
      description: >-
        Partial update — at least one field must be supplied. Only mutable
        flags are accepted; rename/delete go through other endpoints.
      minProperties: 1

    WorkoutExerciseBreakdownItem:
      type: object
      properties:
        exerciseId:
          type: integer
        exerciseName:
          type: string
        muscleGroup:
          type: string
        sets:
          type: integer
        reps:
          type: integer
        volume:
          type: number
        topSetWeight:
          type: number
        topSetReps:
          type: integer
        previousSessionWorkoutId:
          type: integer
          nullable: true
        previousSessionWorkoutName:
          type: string
          nullable: true
        previousSessionDate:
          type: string
          format: date-time
          nullable: true
        previousSessionVolume:
          type: number
          nullable: true
        previousSessionTopWeight:
          type: number
          nullable: true
        previousSessionTotalReps:
          type: integer
          nullable: true
        deltaVolume:
          type: number
          nullable: true
        deltaTopWeight:
          type: number
          nullable: true
        deltaReps:
          type: integer
          nullable: true
        isPersonalRecord:
          type: boolean
      required:
        - exerciseId
        - exerciseName
        - muscleGroup
        - sets
        - reps
        - volume
        - topSetWeight
        - topSetReps
        - previousSessionWorkoutId
        - previousSessionWorkoutName
        - previousSessionDate
        - previousSessionVolume
        - previousSessionTopWeight
        - previousSessionTotalReps
        - deltaVolume
        - deltaTopWeight
        - deltaReps
        - isPersonalRecord

    WorkoutExerciseBreakdownResponse:
      type: object
      properties:
        workoutId:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/WorkoutExerciseBreakdownItem"
      required: [workoutId, items]

    StatsOverview:
      type: object
      properties:
        totalWorkouts:
          type: integer
        totalVolume:
          type: number
        totalReps:
          type: integer
        totalSets:
          type: integer
        bestTonnage:
          type: number
        bestReps:
          type: integer
        bestMaxWeight:
          type: number
        currentStreakDays:
          type: integer
        weekWorkouts:
          type: integer
        topExercises:
          type: array
          items:
            type: object
            properties:
              exerciseId:
                type: integer
              name:
                type: string
              muscleGroup:
                type: string
              sets:
                type: integer
              volume:
                type: number
              maxWeightKg:
                type: number
            required: [exerciseId, name, muscleGroup, sets, volume, maxWeightKg]
        muscleGroupVolume:
          type: array
          items:
            type: object
            properties:
              muscleGroup:
                type: string
              volume:
                type: number
              sets:
                type: integer
            required: [muscleGroup, volume, sets]
      required:
        - totalWorkouts
        - totalVolume
        - totalReps
        - totalSets
        - bestTonnage
        - bestReps
        - bestMaxWeight
        - currentStreakDays
        - weekWorkouts
        - topExercises
        - muscleGroupVolume

    ProgressPoint:
      type: object
      properties:
        workoutId:
          type: integer
        date:
          type: string
          format: date-time
        volume:
          type: number
        reps:
          type: integer
        maxWeight:
          type: number
      required: [workoutId, date, volume, reps, maxWeight]

    ProgressSeries:
      type: object
      properties:
        points:
          type: array
          items:
            $ref: "#/components/schemas/ProgressPoint"
      required: [points]

    ExerciseProgressPoint:
      type: object
      properties:
        workoutId:
          type: integer
        date:
          type: string
          format: date-time
        volume:
          type: number
        reps:
          type: integer
        maxWeight:
          type: number
        topSet:
          type: object
          properties:
            weightKg:
              type: number
            reps:
              type: integer
          required: [weightKg, reps]
      required: [workoutId, date, volume, reps, maxWeight, topSet]

    ExerciseProgress:
      type: object
      properties:
        exercise:
          $ref: "#/components/schemas/Exercise"
        points:
          type: array
          items:
            $ref: "#/components/schemas/ExerciseProgressPoint"
      required: [exercise, points]

    Level:
      type: object
      properties:
        level:
          type: integer
        name:
          type: string
        description:
          type: string
        tier:
          type: integer
        benchmarkKg:
          type: number
          description: >-
            Legacy 1.0× reference weight for this level, computed as
            `bodyWeight × levelFactor(level)`. New per-exercise targets
            should use `MainExerciseStat.requiredKgForNextLevel` instead;
            this field is retained for backwards compatibility with the
            program builder.
        tonnage7dKgRequired:
          type: number
          description: >-
            Required total tonnage (kg) over the last 7 days at this level,
            computed from `3 workouts/week × 5 exercises × 5 sets × 9 reps ×
            workingWeight`, where `workingWeight = bodyWeight ×
            levelFactor(level)`.
        mainExercisesRequired:
          type: integer
        rank:
          $ref: "#/components/schemas/SportRank"
          description: Sport rank badge associated with this level (e.g. Юн III, КМС, МС).
      required:
        - level
        - name
        - description
        - tier
        - benchmarkKg
        - tonnage7dKgRequired
        - mainExercisesRequired
        - rank

    SportRankCode:
      type: string
      enum: [NONE, YOUTH_III, YOUTH_II, YOUTH_I, III_RAZRYAD, II_RAZRYAD, I_RAZRYAD, KMS, MS]
      description: >-
        Sport rank classification code. Ordered from NONE (beginner, LVL 0) to
        MS (Мастер спорта, LVL 76+). Maps to Russian powerlifting rank system.

    SportRank:
      type: object
      properties:
        code:
          $ref: "#/components/schemas/SportRankCode"
        label:
          type: string
          description: Full Russian label, e.g. "III юн. разряд", "КМС", "МС".
        shortLabel:
          type: string
          description: Short label for compact UI, e.g. "Юн III", "I р.", "КМС".
        tier:
          type: integer
          description: 0 (lowest, NONE) to 8 (highest, МС) — for ordering and colour mapping.
        minLevel:
          type: integer
          description: Minimum level to display this rank on the ladder.
      required: [code, label, shortLabel, tier, minLevel]

    McSource:
      type: string
      enum: [classic, coefficient, bodyweight, time, fallback, muscle_group_anchor]
      description: >-
        How the MS-equivalent kg target (mcKg) was derived.
        `classic` — direct from the official ФПР big-3 table;
        `coefficient` — ratio of a classic lift's MS value;
        `bodyweight` — ratio of the athlete's bodyweight;
        `time` — time-based exercise, no kg requirement;
        `fallback` — unknown exercise, uses stored bodyweight_multiplier;
        `muscle_group_anchor` — unknown exercise approximated via muscle-group anchor coefficient.

    RankNormEntry:
      type: object
      properties:
        rank:
          $ref: "#/components/schemas/SportRank"
        kgTarget:
          type: number
          description: Minimum kg lift required to reach this rank for this exercise.
      required: [rank, kgTarget]

    ExerciseRankNorms:
      type: object
      properties:
        mcKg:
          type: number
          nullable: true
          description: МС-equivalent kg target for this exercise. Null for time-based exercises.
        mcSource:
          $ref: "#/components/schemas/McSource"
        userMaxWeightKg:
          type: number
          nullable: true
          description: User's all-time best recorded weight (kg). Null if no sets logged.
        currentRank:
          oneOf:
            - $ref: "#/components/schemas/SportRank"
            - type: "null"
          description: User's current rank on this exercise based on userMaxWeightKg. Null for time-based or if no data.
        nextRank:
          oneOf:
            - $ref: "#/components/schemas/SportRank"
            - type: "null"
          description: Next rank above currentRank. Null if already at МС or time-based.
        kgToNextRank:
          type: number
          nullable: true
          description: kg still needed on top of userMaxWeightKg to reach nextRank. Null if no data or at МС.
        rankNorms:
          type: array
          items:
            $ref: "#/components/schemas/RankNormEntry"
          description: Full 9-entry rank ladder from Б/Р to МС with kg thresholds.
      required: [mcKg, mcSource, userMaxWeightKg, currentRank, nextRank, kgToNextRank, rankNorms]

    AutoPassedReason:
      type: string
      enum: [below_bar_weight, time_based_exercise]
      description: >-
        Why the server auto-passed an exercise without requiring the user to
        actually lift the target.
        `below_bar_weight` — a barbell exercise whose required kg is less than
        the empty-bar floor (20 kg).
        `time_based_exercise` — a time-based exercise (e.g. Планка) that has
        no kg requirement.

    MainExerciseStat:
      type: object
      properties:
        exerciseId:
          type: integer
        name:
          type: string
        muscleGroup:
          type: string
        equipment:
          $ref: "#/components/schemas/Equipment"
        maxWeightKg:
          type: number
        multiplier:
          type: number
          description: Bodyweight multiplier for this exercise (e.g. 1.0 for bench, 1.5 for squat).
        requiredKgForNextLevel:
          type: number
          nullable: true
          description: >-
            Required top-set weight to pass this exercise at the next level,
            already including the multi-level jump penalty when applicable.
            Null at max level.
        requiredKgPenaltyMultiplier:
          type: number
          description: >-
            Penalty multiplier (>= 1) baked into `requiredKgForNextLevel`. >1
            when the user is attempting to skip more than one level above their
            confirmed level; UI uses this to surface why the target is higher
            than the base bodyweight × multiplier × levelFactor would suggest.
        autoPassedReason:
          oneOf:
            - $ref: "#/components/schemas/AutoPassedReason"
            - type: "null"
          description: >-
            When non-null, the exercise is treated as passed regardless of
            `maxWeightKg`. UIs should still display the original
            `requiredKgForNextLevel` for context (e.g. "would have needed
            10 kg, auto-passed since &lt; 20 kg bar").
        mcKg:
          type: number
          nullable: true
          description: >-
            Master-of-Sport (МС) equivalent kg target for this exercise and
            the user's weight class. Null for time-based exercises (e.g.
            Планка). Use this to display "Норматив МС: X кг" in the UI.
        mcSource:
          $ref: "#/components/schemas/McSource"
          description: How mcKg was derived (official table, coefficient, bodyweight ratio, etc.).
      required:
        - exerciseId
        - name
        - muscleGroup
        - equipment
        - maxWeightKg
        - multiplier
        - requiredKgForNextLevel
        - requiredKgPenaltyMultiplier
        - autoPassedReason
        - mcKg
        - mcSource

    LevelStats:
      type: object
      properties:
        currentTonnage7dKg:
          type: number
          description: Total tonnage (kg) lifted in the last 7 days.
        maxTonnage7dKg:
          type: number
          description: Best rolling 7-day tonnage (kg) ever achieved.
        oldestSetInWindowAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the oldest set inside the current 7-day window.
        mainExercises:
          type: array
          items:
            $ref: "#/components/schemas/MainExerciseStat"
      required:
        - currentTonnage7dKg
        - maxTonnage7dKg
        - oldestSetInWindowAt
        - mainExercises

    LevelsResponse:
      type: object
      properties:
        levels:
          type: array
          items:
            $ref: "#/components/schemas/Level"
        currentLevel:
          type: integer
        bestLevelEver:
          type: integer
        nextLevel:
          type: integer
          nullable: true
        confirmedLevel:
          type: integer
          description: >-
            The user's last persisted level — anchor for the multi-level jump
            penalty. Equals `currentLevel` once a level-up is persisted.
        nextLevelPenaltyMultiplier:
          type: number
          description: >-
            Penalty multiplier (>= 1) applied to the next level's tonnage and
            per-exercise requirements. Equals 1 when the next level is just
            `confirmedLevel + 1`; grows by 0.10 per additional skipped level.
        nextLevelTonnage7dKgRequired:
          type: number
          nullable: true
          description: >-
            Effective tonnage target (kg, 7-day window) the user must hit to
            reach the next level — penalty already applied and rounded the same
            way the server's pass check rounds. Null at max level. UIs should
            prefer this value over recomputing locally to avoid rounding drift.
        bodyWeightKg:
          type: number
          description: Bodyweight used to compute requirements (falls back to a default if not set).
        bodyWeightIsFallback:
          type: boolean
          description: True when the user has not set their bodyweight and a default is being used.
        barWeightKg:
          type: number
          description: >-
            Standard empty-bar weight used by the auto-pass rule for barbell
            exercises. Exposed so the client can replicate per-exercise
            calculations for arbitrary levels (e.g. the level-detail dialog).
        levelFactorAnchor:
          type: integer
          description: >-
            Level at which the level factor equals 1.0. Exposed so the client
            can compute `requiredKg = bodyWeight × (level / levelFactorAnchor)
            × multiplier` for any level (rounded to the same 2.5 kg step the
            server uses). Now equals 80 (= МС level).
        currentRank:
          $ref: "#/components/schemas/SportRank"
          description: >-
            Sport rank derived from the user's actual performance on the classic
            big-3 lifts (squat, bench, deadlift) expressed as a fraction of
            their MS norm for their weight class and sex. Falls back to the
            level-based rank when no classic lift data is available.
        weightClassKg:
          type: number
          description: >-
            Official competition weight class (kg) for the user's bodyweight
            and sex. Used to display "ваш класс X кг" on the rank card.
        sex:
          type: string
          enum: [male, female]
          description: Athlete sex used to select the MS standards table.
        confirmedLevelMigrationNeeded:
          type: boolean
          description: >-
            True when the user's confirmed level (saved in DB) is higher than
            the freshly computed current level. Indicates the norms were
            recalibrated or the user's data no longer qualifies; the UI should
            show a hint to re-verify personal records.
        stats:
          $ref: "#/components/schemas/LevelStats"
      required:
        - levels
        - currentLevel
        - bestLevelEver
        - nextLevel
        - confirmedLevel
        - nextLevelPenaltyMultiplier
        - nextLevelTonnage7dKgRequired
        - bodyWeightKg
        - bodyWeightIsFallback
        - barWeightKg
        - levelFactorAnchor
        - currentRank
        - weightClassKg
        - sex
        - confirmedLevelMigrationNeeded
        - stats

    BMICategory:
      type: string
